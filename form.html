<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #heading{
            color:black;
            background-color: rgb(151, 235, 235);
            text-align: center;
        }
        input{
            border:none;
            outline: none;
            border-bottom: 2px dotted;
            
        }

    </style>
</head>
<body>
    <h1 id = "heading">Student Information Form</h1>
    
    <form action="actionpage.html" method="get">
        <fieldset>
            <legend> Student Information</legend>
            
            <ul>
                <li>
                    <label for="name">Name :</label>
                    <input type="text" id = "name" name="name" required placeholder="Enter your name">
                </li>
                <li>
                    <label for="School">School :</label>
                    <input type="text" id="school" name="school" required placeholder="School" value="Parul University" readonly>
                </li>
                <li>
                    <label for="Sports">Sports :</label>
                    <input type="text" id ="Sports" name ="Sports" required placeholder="sports">
                </li>
                <li>
                    <label for="Contact Number">Contact Number :</label>
                    <input type="text" id="Contact Number" name = "Contact Number" required placeholder="+91 9876543210">
                </li>
            </ul>
        </fieldset>
        <fieldset>
            <legend> Medical History </legend>
            <ul>
                <li>
                    History of Concussions
                    <input type="radio" name = "concussions" id ="concussions-yes" value="concussions-yes">
                    <label for="concussions-yes">Yes</label>
                    <input type="radio" name = "concussions" id ="concussions-no" value="concussions-no">
                    <label for="concussions-no">No</label>
                </li>
                <li>
                    <label for="previous_surgeries">Previous Surgeries:</label>
                    <input type ="text" id ="previous_surgeries" name="previous_surgeries">
                </li>
                <li>
                    Any bone fractures ?
                    <input type="radio" id="fractures-yes" name ="fractures" value="fractures-yes">
                    <label for="fractures-yes">Yes</label>
                     <input type="radio" id="fractures-no" name ="fractures" value="fractures-no">
                    <label for="fractures-no">No</label>
                </li>
                <li>
                    Asthma or breathing problems
                    <input type="radio" id ="asthma-yes" name="asthma" id ="asthma-yes">
                    <label for="asthma-yes">Yes</label>
                     <input type="radio" id ="asthma-no" name="asthma" id ="asthma-no">
                    <label for="asthma-no">No</label>
                </li>

            </ul>
        </fieldset>
        <fieldset>
            <legend>Date/Time</legend>
            <ul>
                <li>
                    <label for="DOB">DOB</label>
                    <input type="date" name="DOB" id="DOB" required>
                </li>
                <li>
                    <label for="time">Time</label>
                    <input type="time" name="time" id="time" required>
                </li>
                <li>
                    <label for="datetime">Date-Time</label>
                    <input type="datetime-local" name="datetime" id="datetime">
                </li>
            </ul>


        </fieldset>
        <fieldset>
            <legend>Textarea</legend>
            <ul>
                <li>
                    <p>Summary of last operation</p>
                    <textarea name="text" id="text" rows="5" cols="40" placeholder="Write your summary..."></textarea>
                </li>
            </ul>
        </fieldset>
        <fieldset>
            <legend>File Input</legend>
            Drop your last medical report:
            <label for="file">File</label>
            <input type="file" name="file" id="file" accept=".pdf" required>
            
        </fieldset>
        <fieldset>
            <legend>Checkbox/Select/Number</legend>
            <ul>
                <li>
                    <input type="checkbox" name="check" id="check" required value="yes-terms&conditions">
                    <label for="check"> Terms and Conditions </label>
                    <li>
                         
                     <input type="checkbox" name="Pathlabreport" id="Pathlabreport" required value="yes-Pathlabreport">
                    <label for="Pathlabreport"> Is your reports from Pathlabreport </label>
                    </li>
                   
                </li>
                </li>
            </ul>
        </fieldset>
        <fieldset>
            <legend>Number Input</legend>
            <ul>
                <li>
                    
                    <label for="HB">HB count </label>
                    <input type="number" name="HB" id="HB" placeholder="Enter HB count" required>
                </li>
            </ul>
        </fieldset>
        <fieldset>
            <legend>Select</legend>
            <label for="states">Select State</label>
            <select name="states" id="states">
                <option value="null">Select state</option>
                <option value="maharashtra">Maharashtra</option>
                <option value="gujarat">Gujarat</option>
                <option value="haryana">Haryana</option>
                <option value="rajasthan">Rajasthan</option>
                <option value="goa">Goa</option>
                <option value="kerala">Kerala</option>
            </select>
        </fieldset>
        <fieldset>
            <legend>Email</legend>
            <label for="email">Email</label>
            <input type="email" name="email" id="email"/>
            <br>
            <label for="range">Ratings:</label>
            <br>
            <input 
            type="range"
            name="range"
            id="range"
            min="0"
            max="100"
            value="6"
            />
        </fieldset>
            <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
</body>
</html>
